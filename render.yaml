# Render.com deployment configuration
services:
  - type: web
    name: legalassist-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        value: https://legalassistglobal.com,https://www.legalassistglobal.com
      - key: APP_ENV
        value: production
      # ── Neon PostgreSQL connection ──────────────────────────────────
      - key: DB_HOST
        sync: false          # ep-long-recipe-ab0ct4dm.eu-west-2.aws.neon.tech
      - key: DB_USER
        sync: false          # neondb_owner
      - key: DB_PASSWORD
        sync: false          # Your Neon DB password
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: neondb
      # ── Fallback (not used if DB_HOST is set) ──────────────────────
      - key: DATABASE_URL
        sync: false
      # ── Site config ────────────────────────────────────────────────
      - key: SITE_URL
        value: https://legalassistglobal.com
      - key: SITE_SITEMAP_URL
        value: https://legalassistglobal.com/page-sitemap.xml
