# Render.com deployment configuration
services:
  - type: web
    name: legalassist-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        value: https://legalassistglobal.com,https://www.legalassistglobal.com
      - key: APP_ENV
        value: production
      # --- Supabase PostgreSQL (set via Render dashboard / API) ---
      - key: DB_HOST
        sync: false          # e.g. aws-0-eu-west-2.pooler.supabase.com
      - key: DB_USER
        sync: false          # e.g. postgres.yourprojectref
      - key: DB_PASSWORD
        sync: false          # Your Supabase DB password
      - key: DB_PORT
        sync: false          # 5432
      - key: DATABASE_URL
        sync: false          # Fallback full URL if DB_HOST not set
      # --- Site config ---
      - key: SITE_URL
        value: https://legalassistglobal.com
      - key: SITE_SITEMAP_URL
        value: https://legalassistglobal.com/page-sitemap.xml
      # Note: CHROMA_DB_PATH is no longer needed — ChromaDB runs in-memory
